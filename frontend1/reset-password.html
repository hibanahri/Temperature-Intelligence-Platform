<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - IIoT Temperature System</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="brand">
                <span class="brand-icon">▶</span>
                <span class="brand-text">IIoT</span>
            </div>
            <div class="hero-content">
                <h1>Create New<br>Password</h1>
                <p>Choose a strong password</p>
            </div>
            <div class="iot-illustration">
                <div class="iot-graphic">
                    <div class="iot-circle">
                        <span class="wifi-icon">📶</span>
                    </div>
                    <div class="iot-blocks">
                        <div class="block block-1">I</div>
                        <div class="block block-2">o</div>
                        <div class="block block-3">T</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <h2>Reset Password</h2>
                <p class="auth-subtitle">Enter your new password</p>
                
                <div id="errorMessage" class="error-message hidden"></div>
                <div id="successMessage" class="success-message hidden"></div>
                
                <form id="resetForm">
                    <div class="form-group">
                        <label for="password">New Password</label>
                        <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="auth-btn" id="submitBtn">Reset Password</button>
                </form>
                
                <div class="auth-footer">
                    <p>Remember your password? <a href="signin.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleResetPassword();
        });
    </script>
</body>
</html>
