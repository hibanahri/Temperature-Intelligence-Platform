<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - IIoT Temperature System</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="brand">
                <span class="brand-icon">▶</span>
                <span class="brand-text">IIoT</span>
            </div>
            <nav class="auth-nav">
                <a href="#">Pricing</a>
                <a href="#">Features</a>
                <a href="#">Blog</a>
                <a href="#">F.A.Q.</a>
                <a href="#">Contact</a>
            </nav>
            <div class="hero-content">
                <h1>Monitor Your<br>Temperature</h1>
                <p>Best IoT tools for industrial monitoring</p>
            </div>
            <div class="iot-illustration">
                <div class="iot-graphic">
                    <div class="iot-circle">
                        <span class="wifi-icon">📶</span>
                    </div>
                    <div class="iot-blocks">
                        <div class="block block-1">I</div>
                        <div class="block block-2">o</div>
                        <div class="block block-3">T</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join the IIoT monitoring platform</p>
                
                <div id="errorMessage" class="error-message hidden"></div>
                <div id="successMessage" class="success-message hidden"></div>
                
                <form id="signupForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="auth-btn" id="submitBtn">Create Account</button>
                </form>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="signin.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleSignup();
        });
    </script>
</body>
</html>
