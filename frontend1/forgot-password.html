<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - IIoT Temperature System</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="brand">
                <span class="brand-icon">▶</span>
                <span class="brand-text">IIoT</span>
            </div>
            <div class="hero-content">
                <h1>Reset Your<br>Password</h1>
                <p>We'll help you get back in</p>
            </div>
            <div class="iot-illustration">
                <div class="iot-graphic">
                    <div class="iot-circle">
                        <span class="wifi-icon">📶</span>
                    </div>
                    <div class="iot-blocks">
                        <div class="block block-1">I</div>
                        <div class="block block-2">o</div>
                        <div class="block block-3">T</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <h2>Forgot Password</h2>
                <p class="auth-subtitle">Enter your email to receive a reset link</p>
                
                <div id="errorMessage" class="error-message hidden"></div>
                <div id="successMessage" class="success-message hidden"></div>
                
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="auth-btn" id="submitBtn">Send Reset Link</button>
                </form>
                
                <div class="auth-footer">
                    <p>Remember your password? <a href="signin.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleForgotPassword();
        });
    </script>
</body>
</html>
